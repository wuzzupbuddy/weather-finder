<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Finder</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:read-only {
            background-color: #eee;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ae1c21;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #8c1418;
        }
        .status-message {
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Weather Finder</h2>
    
    <!-- Formspree Integration Form -->
    <form action="https://formspree.io" method="POST">
        
        <div class="form-group">
            <label for="email">Your Email Address</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label for="latitude">Latitude</label>
            <input type="text" id="latitude" name="latitude" placeholder="Fetching..." readonly required>
        </div>

        <div class="form-group">
            <label for="longitude">Longitude</label>
            <input type="text" id="longitude" name="longitude" placeholder="Fetching..." readonly required>
        </div>

        <div class="form-group">
            <label for="weather">Current Weather Data</label>
            <input type="text" id="weather" name="weather_summary" placeholder="Fetching weather..." readonly required>
        </div>

        <button type="submit">Log Data</button>
        <div id="status" class="status-message">Requesting location permissions...</div>
    </form>
</div>

<script>
    // 1. Get user's GPS coordinates
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(successCallback, errorCallback);
    } else {
        document.getElementById('status').innerText = "Geolocation is not supported by this browser.";
    }

    function successCallback(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        
        document.getElementById('latitude').value = lat;
        document.getElementById('longitude').value = lon;
        document.getElementById('status').innerText = "Location found. Fetching weather...";
        
        getWeatherData(lat, lon);
    }

    function errorCallback(error) {
        document.getElementById('status').innerText = "Unable to retrieve your location.";
        console.error(error);
    }

    // 2. Fetch dummy/mock weather info based on coordinates 
    function getWeatherData(lat, lon) {
        document.getElementById('weather').value = "Sunny, 22°C (Simulated)";
        document.getElementById('status').innerText = "Ready to log data.";
    }
</script>

</body>
</html>
